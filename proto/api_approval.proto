syntax = "proto3";

package api;
import "google/api/annotations.proto";
import "include/graphql.proto";
option go_package = "./api";

message XRC20ApprovalInfo {
  string action_hash      = 1;
  string contract_address = 2;
  string owner            = 3;
  string spender          = 4;
  string amount           = 5;
  string timestamp        = 6;
}

message GetXRC20ApprovalsRequest {
  string owner_address = 1;
}

message GetXRC20ApprovalsResponse {
  repeated XRC20ApprovalInfo approvals = 1;
}

message XRC721ApprovalInfo {
  string action_hash      = 1;
  string contract_address = 2;
  string owner            = 3;
  string approved         = 4;
  string token_id         = 5;
  string timestamp        = 6;
}

message GetXRC721ApprovalsRequest {
  string owner_address = 1;
}

message GetXRC721ApprovalsResponse {
  repeated XRC721ApprovalInfo approvals = 1;
}

service ApprovalService {
  rpc GetXRC20Approvals(GetXRC20ApprovalsRequest) returns (GetXRC20ApprovalsResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "GetXRC20Approvals"
    };
    option (google.api.http) = {
      post: "/api.ApprovalService.GetXRC20Approvals"
      body: "*"
    };
  };
  rpc GetXRC721Approvals(GetXRC721ApprovalsRequest) returns (GetXRC721ApprovalsResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "GetXRC721Approvals"
    };
    option (google.api.http) = {
      post: "/api.ApprovalService.GetXRC721Approvals"
      body: "*"
    };
  };
}
