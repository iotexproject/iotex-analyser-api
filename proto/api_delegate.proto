syntax = "proto3";

package api;
import "google/api/annotations.proto";
import "include/graphql.proto";
import "include/pagination.proto";
option go_package = "./api";


message BucketInfoRequest{
  uint64 startEpoch = 1; // Epoch number to start from
  uint64 epochCount = 2; // Number of epochs to query
  string delegateName =3; // Name of the delegate
  pagination.Pagination pagination = 4; //Pagination info
}

message BucketInfoResponse {
  bool exist = 1; // whether the delegate has voting bucket information within the specified epoch range
  uint64 count = 2; // total number of buckets in the given epoch for the given delegate
	repeated BucketInfoList  bucketInfoList = 3; 
}

message BucketInfo {
  string voterEthAddress = 1; // voter’s ERC20 address
	string voterIotexAddress = 2; // voter's IoTeX address
	bool isNative = 3; // whether the bucket is native
	string votes = 4; // voter's votes
	string weightedVotes = 5; // voter’s weighted votes
	string remainingDuration = 6; // bucket remaining duration
	string startTime = 7; // bucket start time
	bool decay = 8; // whether the vote weight decays
  uint64 bucketID = 9; // bucket id
}

message BucketInfoList {
  uint64 epochNumber = 1; // epoch number
	uint64 count = 2; //total number of buckets in the given epoch for the given delegate
  repeated BucketInfo  bucketInfo = 3;
}

message BookKeepingRequest {
  uint64 startEpoch = 1; // epoch number to start from
  uint64 epochCount = 2; // number of epochs to query
  string delegateName =3; // name of the delegate
  pagination.Pagination pagination = 4; //Pagination info
  uint64 epochRewardPerc = 5; // percentage of the epoch reward to be paid to the delegate
  uint64 blockRewardPerc = 6; // percentage of the block reward to be paid to the delegate
  uint64 foundationBonusPerc = 7; // percentage of the foundation bonus to be paid to the delegate
}

message BookKeepingResponse {
  bool exist = 1; // whether the delegate has bookkeeping information within the specified epoch range
  uint64 count = 2; // total number of reward distributions
  repeated DelegateRewardDistribution rewardDistribution = 3;
}

message DelegateRewardDistribution {
  string voterEthAddress = 1; // voter’s ERC20 address
  string voterIotexAddress = 2; // voter’s IoTeX address
  string amount = 3; // amount of reward distribution
}

message Productivity {
  bool exist = 1; // whether the delegate has productivity information within the specified epoch range
  uint64 production = 2; // number of block productions
  uint64 expectedProduction = 3; // number of expected block productions
}

message ProductivityRequest {
  uint64 startEpoch = 1; // starting epoch number
  uint64 epochCount = 2; // epoch count
  string delegateName =3; // producer name
}

message ProductivityResponse {
  Productivity productivity = 1;
}

message Reward {
  string blockReward = 1; // amount of block rewards
  string epochReward = 2; // amount of epoch rewards
  string foundationBonus = 3; // amount of foundation bonus
  bool exist = 4; // whether the delegate has reward information within the specified epoch range
}
message RewardRequest {
  uint64 startEpoch = 1; // Epoch number to start from
  uint64 epochCount = 2; // Number of epochs to query
  string delegateName =3; // Name of the delegate
}

message RewardResponse {
  Reward reward = 1;
}

message StakingRequest {
  uint64 startEpoch = 1; // starting epoch number
  uint64 epochCount = 2; // epoch count
  string delegateName = 3; // candidate name
}

message StakingResponse {
  bool exist = 1; // whether the delegate has staking information within the specified epoch range
  message StakingInfo {
    uint64 epochNumber = 1; //epoch number
    string totalStaking = 2; // total staking amount
    string selfStaking = 3; // candidate’s self-staking amount
  }
  repeated StakingInfo stakingInfo = 2;
}

message ProbationHistoricalRateRequest {
  uint64 startEpoch = 1; // starting epoch number
  uint64 epochCount = 2; // epoch count
  string delegateName = 3; // candidate name
}

message ProbationHistoricalRateResponse {
  string probationHistoricalRate = 1; // probation historical rate
}

message PaidToDelegatesRequest {
  enum Schedule {
      MONTHLY = 0;
      DAILY = 1;
    }
    Schedule schedule = 1;
    string date = 2;
}
message PaidToDelegatesResponse {
  message DelegateInfo {
    string delegateName = 2; // delegate name
    string amount = 3; // amount of reward distribution
    string blockReward = 4; // amount of block rewards
    string epochReward = 5; // amount of epoch rewards
    string foundationBonus = 6; // amount of foundation bonus
  }
  repeated DelegateInfo delegateInfo = 1;
}


service DelegateService {
  // BucketInfo provides voting bucket detail information for candidates within a range of epochs
  rpc BucketInfo(BucketInfoRequest) returns (BucketInfoResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "BucketInfo"
    };
    option (google.api.http) = {
      post: "/api.DelegateService.BucketInfo"
      body: "*"
    };
  };
  // BookKeeping gives delegates an overview of the reward distributions to their voters within a range of epochs
  rpc BookKeeping(BookKeepingRequest) returns (BookKeepingResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "BookKeeping"
    };
    option (google.api.http) = {
      post: "/api.DelegateService.BookKeeping"
      body: "*"
    };
  };
  // Productivity gives block productivity of producers within a range of epochs
  rpc Productivity(ProductivityRequest) returns (ProductivityResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "Productivity"
    };
    option (google.api.http) = {
      post: "/api.DelegateService.Productivity"
      body: "*"
    };
  };
  // Rewards provides reward detail information for candidates within a range of epochs
  rpc Reward(RewardRequest) returns (RewardResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "Reward"
    };
    option (google.api.http) = {
      post: "/api.DelegateService.Reward"
      body: "*"
    };
  };

  // Staking provides staking information for candidates within a range of epochs
  rpc Staking(StakingRequest) returns (StakingResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "Staking"
    };
    option (google.api.http) = {
      post: "/api.DelegateService.Staking"
      body: "*"
    };
  };
  // ProbationHistoricalRate provides the rate of probation for a given delegate
  rpc ProbationHistoricalRate(ProbationHistoricalRateRequest) returns (ProbationHistoricalRateResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "ProbationHistoricalRate"
    };
    option (google.api.http) = {
      post: "/api.DelegateService.ProbationHistoricalRate"
      body: "*"
    };
  };
  // PaidToDelegates provides the amount of rewards paid to delegates
  rpc PaidToDelegates(PaidToDelegatesRequest) returns (PaidToDelegatesResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "PaidToDelegates"
    };
    option (google.api.http) = {
      post: "/api.DelegateService.PaidToDelegates"
      body: "*"
    };
  };

  // GetDelegatesByHeight returns the delegate_record snapshot at a specific block height (or latest)
  rpc GetDelegatesByHeight(GetDelegatesByHeightRequest) returns (GetDelegatesByHeightResponse) {
    option (google.api.http) = {
      post: "/api.DelegateService.GetDelegatesByHeight"
      body: "*"
    };
  };

  // GetBlocksByProducer returns recent blocks produced by a given producer address
  rpc GetBlocksByProducer(GetBlocksByProducerRequest) returns (GetBlocksByProducerResponse) {
    option (google.api.http) = {
      post: "/api.DelegateService.GetBlocksByProducer"
      body: "*"
    };
  };

  // ── Added for iotex-kit modules-db migration (delegate.ts this.analysis) ──
  rpc GetDelegateHeight(GetDelegateHeightRequest) returns (GetDelegateHeightResponse) {
    option (google.api.http) = { post: "/api.DelegateService.GetDelegateHeight" body: "*" };
  };
  rpc GetProductivityHistory(GetProductivityHistoryRequest) returns (GetProductivityHistoryResponse) {
    option (google.api.http) = { post: "/api.DelegateService.GetProductivityHistory" body: "*" };
  };
  rpc GetProbationHistory(GetProbationHistoryRequest) returns (GetProbationHistoryResponse) {
    option (google.api.http) = { post: "/api.DelegateService.GetProbationHistory" body: "*" };
  };
  rpc GetDelegateRewards(GetDelegateRewardsRequest) returns (GetDelegateRewardsResponse) {
    option (google.api.http) = { post: "/api.DelegateService.GetDelegateRewards" body: "*" };
  };
  rpc GetDelegateRewardsHistory(GetDelegateRewardsHistoryRequest) returns (GetDelegateRewardsHistoryResponse) {
    option (google.api.http) = { post: "/api.DelegateService.GetDelegateRewardsHistory" body: "*" };
  };
  rpc GetReceivedVotesByAddress(GetReceivedVotesByAddressRequest) returns (GetReceivedVotesByAddressResponse) {
    option (google.api.http) = { post: "/api.DelegateService.GetReceivedVotesByAddress" body: "*" };
  };
  rpc GetDelegatesStatistics(GetDelegatesStatisticsRequest) returns (GetDelegatesStatisticsResponse) {
    option (google.api.http) = { post: "/api.DelegateService.GetDelegatesStatistics" body: "*" };
  };
}

// ── Messages for the modules-db migration RPCs above ──
// Source SQL is ported 1:1 from kit modules-db/delegate.ts (this.analysis).

message GetDelegateHeightRequest { string name = 1; }                       // block_meta.producer_name
message GetDelegateHeightResponse { bool exist = 1; uint64 block_height = 2; }

message GetProductivityHistoryRequest {
  string candidate = 1;   // 0x or io; server normalizes to io
  string start_date = 2;  // optional ("" = ignored), date_time > start
  string end_date = 3;    // required, date_time < end
}
message ProductivityHistoryItem {
  int64 id = 1;
  string productivity = 2;      // numeric as string
  string temp_eth_address = 3;  // candidate (io)
  string date = 4;              // date_time::text
}
message GetProductivityHistoryResponse { repeated ProductivityHistoryItem data = 1; }

message GetProbationHistoryRequest {
  string candidate = 1;   // 0x or io
  string start_date = 2;  // timestamp > start
  string end_date = 3;    // timestamp < end
}
message ProbationHistoryItem {
  bool probation = 1;   // always true (row presence = in probation that day)
  string address = 2;   // operator_address
  string date = 3;      // "year-month-day"
}
message GetProbationHistoryResponse { repeated ProbationHistoryItem data = 1; }

message GetDelegateRewardsRequest { string candidate = 1; }
message GetDelegateRewardsResponse {
  bool exist = 1;
  string block_reward = 2;
  string epoch_reward = 3;
  string foundation_bonus = 4;
  string burn_reward = 5;
}

message GetDelegateRewardsHistoryRequest {
  string candidate = 1;
  string start_date = 2;  // inclusive (::date)
  string end_date = 3;    // inclusive (::date)
}
message DelegateRewardsHistoryItem {
  string block_reward = 1;
  string epoch_reward = 2;
  string foundation_bonus = 3;
  string burn_reward = 4;
  string date_time = 5;   // ::text
}
message GetDelegateRewardsHistoryResponse { repeated DelegateRewardsHistoryItem data = 1; }

message GetReceivedVotesByAddressRequest { string address = 1; } // io owner_address
message ReceivedVoteItem {
  string staker = 1;   // sender
  string amount = 2;   // staked_amount
  string votes = 3;    // voting_power
  string duration = 4;
}
message GetReceivedVotesByAddressResponse { repeated ReceivedVoteItem data = 1; }

message GetDelegatesStatisticsRequest {}
message GetDelegatesStatisticsResponse {
  bool exist = 1;
  uint64 delegate_count = 2;
  string total_amount = 3;  // sum(stake_amount) as decimal string
}

// ─── Added for iotex-kit modules-db migration ───

// GetDelegatesByHeight: replaces kit staking.delegatesByHeight.
message DelegateRecord {
  uint64 block_height = 1;
  string candidate_address = 2;
  string candidate_name = 3;
  string operator_address = 4;
  string reward_address = 5;
  string self_staking_tokens = 6;
  string total_weighted_votes = 7;
  string stake_amount = 8;
  bool active = 9;
}
message GetDelegatesByHeightRequest {
  uint64 height = 1; // 0 = latest
}
message GetDelegatesByHeightResponse {
  uint64 height = 1;
  repeated DelegateRecord delegates = 2;
}

// GetBlocksByProducer: replaces kit staking.delegate_recent_blocks.
message ProducerBlock {
  uint64 block_height = 1;
  string block_hash = 2;
  string producer_address = 3;
  uint64 num_actions = 4;
  int64 timestamp = 5;        // unix millis
  uint64 gas_consumed = 6;
  string producer_name = 7;
  string block_reward = 8;
}
message GetBlocksByProducerRequest {
  string producer_address = 1;
  pagination.Pagination pagination = 2;
}
message GetBlocksByProducerResponse {
  uint64 count = 1;
  repeated ProducerBlock blocks = 2;
}