syntax = "proto3";

package api;
import "google/api/annotations.proto";
import "include/graphql.proto";
//import "include/pagination.proto";
option go_package = "./api";

message VoteByHeightRequest {
  repeated string address = 1; // voter address list
  uint64 height = 2; // block height
}

message VoteByHeightResponse {
  uint64 height = 1; // block height
  repeated string stakeAmount  = 2; // stake amount list
  repeated string voteWeight  = 3; // vote weight list
}

message CandidateVoteByHeightRequest {
  repeated string address = 1;
  uint64 height = 2;
}

message CandidateVoteByHeightResponse {
  uint64 height = 1;
  repeated string stakeAmount  = 2;
  repeated string voteWeight  = 3;
  repeated string address = 4;
}

message StakingBucketInfo {
  uint64 bucket_id          = 1;
  string owner_address      = 2;
  string candidate          = 3;
  string staked_amount      = 4;
  string voting_power       = 5;
  uint32 duration           = 6; // seconds
  bool   auto_stake         = 7;
  uint32 create_time        = 8; // unix timestamp
  uint32 stake_start_time   = 9; // unix timestamp
  uint32 unstake_start_time = 10; // unix timestamp, 0 if not unstaking
  uint64 block_height       = 11;
}

message BucketByIDRequest {
  repeated uint64 bucket_id      = 1;
  uint64          height         = 2; // 0 = latest indexed height
  bool            include_system = 3; // whether to query system buckets, default false
}

message BucketByIDResponse {
  uint64                   height             = 1;
  repeated StakingBucketInfo native_buckets    = 2;
  repeated StakingBucketInfo system_buckets    = 3;
  repeated StakingBucketInfo system_v2_buckets = 4;
  repeated StakingBucketInfo system_v3_buckets = 5;
}

// BucketInfoEx carries all fields for the bucket list/detail pages.
message BucketInfoEx {
  int64  bucket_id          = 1;
  string action_hash        = 2;
  string timestamp          = 3;
  string create_time        = 4;
  string stake_start_time   = 5;
  string unstake_start_time = 6;
  string amount             = 7;
  string staked_amount      = 8;
  string act_type           = 9;
  string sender             = 10;
  string owner_address      = 11;
  string candidate          = 12;
  bool   auto_stake         = 13;
  string duration           = 14;
  string gas_price          = 15;
  string gas_limit          = 16;
  string recipient          = 17;
  string delegate_name      = 18;
}

message GetBucketListRequest {
  int64  limit    = 1;
  int64  offset   = 2;
  string sort     = 3;     // e.g. "timestamp:desc"
  string interval = 4;    // "1D", "7D", "30D", "1Y", "ALL"
  string version  = 5;    // "native", "nft_v1", "nft_v2", "nft_v3"
}

message GetBucketListResponse {
  repeated BucketInfoEx buckets     = 1;
  int64                 count       = 2;
  int64                 group_count = 3;
}

message GetBucketsByBucketIdRequest {
  int64  bucket_id = 1;
  int64  limit     = 2;
  int64  offset    = 3;
  string version   = 4;
}

message GetBucketsByBucketIdResponse {
  repeated BucketInfoEx buckets = 1;
  int64                 count   = 2;
}

message GetBucketByBucketIdRequest {
  int64  bucket_id = 1;
  string version   = 2;
}

message GetBucketByBucketIdResponse {
  bool         exist  = 1;
  BucketInfoEx bucket = 2;
}

message GetNativeBucketsRequest {
  int64 limit  = 1;
  int64 offset = 2;
}

message GetNativeBucketsResponse {
  repeated BucketInfoEx buckets = 1;
  int64                 count   = 2;
}

service StakingService {
  // Get the stake amount and voting weight of the voter's specified height
  rpc VoteByHeight(VoteByHeightRequest) returns (VoteByHeightResponse) {
    option (graphql.schema) = {
      type: QUERY 
      name: "VoteByHeight"
    };
    option (google.api.http) = {
      post: "/api.StakingService.VoteByHeight"
      body: "*"
    };
  };
  rpc CandidateVoteByHeight(CandidateVoteByHeightRequest) returns (CandidateVoteByHeightResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "CandidateVoteByHeight"
    };
    option (google.api.http) = {
      post: "/api.StakingService.CandidateVoteByHeight"
      body: "*"
    };
  };
  rpc BucketByID(BucketByIDRequest) returns (BucketByIDResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "BucketByID"
    };
    option (google.api.http) = {
      post: "/api.StakingService.BucketByID"
      body: "*"
    };
  };
  rpc GetBucketList(GetBucketListRequest) returns (GetBucketListResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "GetBucketList"
    };
    option (google.api.http) = {
      post: "/api.StakingService.GetBucketList"
      body: "*"
    };
  };
  rpc GetBucketsByBucketId(GetBucketsByBucketIdRequest) returns (GetBucketsByBucketIdResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "GetBucketsByBucketId"
    };
    option (google.api.http) = {
      post: "/api.StakingService.GetBucketsByBucketId"
      body: "*"
    };
  };
  rpc GetBucketByBucketId(GetBucketByBucketIdRequest) returns (GetBucketByBucketIdResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "GetBucketByBucketId"
    };
    option (google.api.http) = {
      post: "/api.StakingService.GetBucketByBucketId"
      body: "*"
    };
  };
  rpc GetNativeBuckets(GetNativeBucketsRequest) returns (GetNativeBucketsResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "GetNativeBuckets"
    };
    option (google.api.http) = {
      post: "/api.StakingService.GetNativeBuckets"
      body: "*"
    };
  };
}