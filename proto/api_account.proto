syntax = "proto3";

package api;
import "google/api/annotations.proto";
import "include/graphql.proto";
import "include/pagination.proto";
option go_package = "./api";

message IotexBalanceByHeightRequest {
  repeated string address = 1; //address lists
  uint64 height = 2; //block height
}

message IotexBalanceByHeightResponse {
  uint64 height = 1; //block height
  repeated string balance  = 2; //balance at the given height.
}

message Erc20TokenBalanceByHeightResponse {
  uint64 height = 1;
  string contract_address = 2;
  repeated string balance  = 3;
  uint64 decimals = 4;
}

message Erc20TokenBalanceByHeightRequest {
  repeated string address = 1;
  uint64 height = 2;
  string contract_address = 3;
}


message ActiveAccountsRequest {
  uint64 count = 1; // number of account addresses to be queried for active accounts
}

message ActiveAccountsResponse {
  repeated string activeAccounts = 1; //list of account addresses
}

message OperatorAddressRequest {
  string aliasName = 1; // delegate's alias name
}

message OperatorAddressResponse {
  bool exist = 1; // whether the alias name exists
  string operatorAddress = 2; // operator address associated with the given alias name
}

message AliasRequest {
  string operatorAddress = 1; // delegate's operator address
}

message AliasResponse {
  bool exist = 1; // whether the operator address exists
  string aliasName = 2;// delegate's alias name
}

message TotalNumberOfHoldersRequest {
}

message TotalNumberOfHoldersResponse {
  uint64 totalNumberOfHolders = 1; // total number of IOTX holders so far
}

message TotalAccountSupplyRequest {
}

message TotalAccountSupplyResponse {
  string totalAccountSupply = 1; // total amount of tokens held by IoTeX accounts
}

message ContractInfoRequest {
  repeated string contractAddress = 1; // contract address
}
message ContractInfoResponse {
  message Contract {
    bool exist = 1; // whether the contract address exists
    string deployer = 2; // contract creator 
    string createTime = 3; // contract create time
    uint64 callTimes = 4; // contract call times
    string accumulatedGas = 5; // accumulated transaction fee
    string contractAddress = 6; // contract address
  }
  repeated Contract contracts = 1;

}
message GetAccountMetaRequest {
  repeated string addresses = 1;
}
message AccountMetaInfo {
  string address = 1;
  bool is_contract = 2;
  uint64 block_height = 3;
  string contract_bytecode_hash = 4;
}
message GetAccountMetaResponse {
  repeated AccountMetaInfo accounts = 1;
}

message GetContractCreateInfoRequest {
  string address = 1;
}
message GetContractCreateInfoResponse {
  string action_hash = 1;
  string creator = 2;
}

message NFTBalanceInfo {
  string contract_address = 1;
  string type = 2;    // "xrc721" or "xrc1155"
  string balance = 3;
}

message GetAddressNFTBalancesRequest {
  string address = 1;
}

message GetAddressNFTBalancesResponse {
  repeated NFTBalanceInfo balances = 1;
}

message TokenBalanceInfo {
  string contract_address = 1;
  string balance = 2;
}

message GetAddressTokenBalancesRequest {
  string address = 1;
}

message GetAddressTokenBalancesResponse {
  repeated TokenBalanceInfo balances = 1;
}

message TopAccountRow {
  string owner_address = 1;
  uint64 bucket_id = 2;
  string staked_amount = 3;
  string duration = 4;
  string mf = 5;
  string last_update = 6;
  string balance = 7;
}

message GetTopAccountsRequest {
  pagination.Pagination pagination = 1;
  string stake_amount = 2;    // "more" (>= 10000 IOTX) or "less"
  string stake_duration = 3;  // "more" (>= 91 days) or "less"
  string mf = 4;              // "hold" (mf > 0) or "" (mf = 0)
}

message GetTopAccountsResponse {
  int64 count = 1;
  repeated TopAccountRow accounts = 2;
}

message AccountBalanceRow {
  string address = 1;
  string balance = 2;        // in_flow - out_flow as decimal string (rau)
  int64 total_actions = 3;   // in_num_actions + out_num_actions
}

message GetTopAccountsByBalanceRequest {
  int64 limit = 1;
  int64 offset = 2;
}

message GetTopAccountsByBalanceResponse {
  int64 count = 1;
  repeated AccountBalanceRow accounts = 2;
}

service AccountService {
  // IotexBalanceByHeight returns the balance of the given address at the given height.
  rpc IotexBalanceByHeight(IotexBalanceByHeightRequest) returns (IotexBalanceByHeightResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "IotexBalanceByHeight"
    };
    option (google.api.http) = {
      post: "/api.AccountService.IotexBalanceByHeight"
      body: "*"
    };
  };
  rpc Erc20TokenBalanceByHeight(Erc20TokenBalanceByHeightRequest) returns (Erc20TokenBalanceByHeightResponse) {
    option (graphql.schema) = {
      type: QUERY 
      name: "Erc20TokenBalanceByHeight"
    };
    option (google.api.http) = {
      post: "/api.AccountService.Erc20TokenBalanceByHeight"
      body: "*"
    };
  };
  // ActiveAccounts lists most recently active accounts
  rpc ActiveAccounts(ActiveAccountsRequest) returns (ActiveAccountsResponse) {
    option (graphql.schema) = {
      type: QUERY 
      name: "ActiveAccounts"
    };
    option (google.api.http) = {
      post: "/api.AccountService.ActiveAccounts"
      body: "*"
    };
  };
  // OperatorAddress finds the delegate's operator address given the delegate's alias name
  rpc OperatorAddress(OperatorAddressRequest) returns (OperatorAddressResponse) {
    option (graphql.schema) = {
      type: QUERY 
      name: "OperatorAddress"
    };
    option (google.api.http) = {
      post: "/api.AccountService.OperatorAddress"
      body: "*"
    };
  };
  // Alias finds the delegate's alias name given the delegate's operator address
  rpc Alias(AliasRequest) returns (AliasResponse) {
    option (graphql.schema) = {
      type: QUERY 
      name: "Alias"
    };
    option (google.api.http) = {
      post: "/api.AccountService.Alias"
      body: "*"
    };
  };
  // TotalNumberOfHolders returns total number of IOTX holders so far
  rpc TotalNumberOfHolders(TotalNumberOfHoldersRequest) returns (TotalNumberOfHoldersResponse) {
    option (graphql.schema) = {
      type: QUERY 
      name: "TotalNumberOfHolders"
    };
    option (google.api.http) = {
      post: "/api.AccountService.TotalNumberOfHolders"
      body: "*"
    };
  };
  // TotalAccountSupply returns total amount of tokens held by IoTeX accounts
  rpc TotalAccountSupply(TotalAccountSupplyRequest) returns (TotalAccountSupplyResponse) {
    option (graphql.schema) = {
      type: QUERY 
      name: "TotalAccountSupply"
    };
    option (google.api.http) = {
      post: "/api.AccountService.TotalAccountSupply"
      body: "*"
    };
  };  
  // ContractInfo returns contract info by address, include contract creator, contract create time, contract call times, accumulated transaction fee
  rpc ContractInfo(ContractInfoRequest) returns (ContractInfoResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "ContractInfo"
    };
    option (google.api.http) = {
      post: "/api.AccountService.ContractInfo"
      body: "*"
    };
  };
  // GetAccountMeta returns account metadata (is_contract, block_height, bytecode hash)
  rpc GetAccountMeta(GetAccountMetaRequest) returns (GetAccountMetaResponse) {
    option (google.api.http) = {
      post: "/api.AccountService.GetAccountMeta"
      body: "*"
    };
  };
  // GetContractCreateInfo returns the action hash and creator for a contract
  rpc GetContractCreateInfo(GetContractCreateInfoRequest) returns (GetContractCreateInfoResponse) {
    option (google.api.http) = {
      post: "/api.AccountService.GetContractCreateInfo"
      body: "*"
    };
  };
  // GetAddressNFTBalances returns NFT token balances for an address
  rpc GetAddressNFTBalances(GetAddressNFTBalancesRequest) returns (GetAddressNFTBalancesResponse) {
    option (google.api.http) = {
      post: "/api.AccountService.GetAddressNFTBalances"
      body: "*"
    };
  };
  // GetAddressTokenBalances returns ERC20 token balances for an address
  rpc GetAddressTokenBalances(GetAddressTokenBalancesRequest) returns (GetAddressTokenBalancesResponse) {
    option (google.api.http) = {
      post: "/api.AccountService.GetAddressTokenBalances"
      body: "*"
    };
  };
  // GetTopAccounts returns top stakers from stats_top_list_view with filters
  rpc GetTopAccounts(GetTopAccountsRequest) returns (GetTopAccountsResponse) {
    option (google.api.http) = {
      post: "/api.AccountService.GetTopAccounts"
      body: "*"
    };
  };
  // GetTopAccountsByBalance returns top accounts by IOTX balance from account_income_count
  rpc GetTopAccountsByBalance(GetTopAccountsByBalanceRequest) returns (GetTopAccountsByBalanceResponse) {
    option (google.api.http) = {
      post: "/api.AccountService.GetTopAccountsByBalance"
      body: "*"
    };
  };
  // GetAuthorizationsByAuthority returns EIP-7702 authorization history for an authority address
  rpc GetAuthorizationsByAuthority(GetAuthorizationsByAuthorityRequest) returns (GetAuthorizationsByAuthorityResponse) {
    option (google.api.http) = {
      post: "/api.AccountService.GetAuthorizationsByAuthority"
      body: "*"
    };
  };
}

message AuthorizationHistoryEntry {
  string action_hash  = 1;
  uint64 block_height = 2;
  string chain_id     = 3;
  string address      = 4; // delegated contract
  string nonce        = 5;
  string y_parity     = 6;
  string authority    = 7; // recovered signer (= the account queried)
  bool   valid        = 8; // whether this authorization was accepted by the chain at inclusion time
}

message GetAuthorizationsByAuthorityRequest {
  string authority = 1;
  int32  skip      = 2;
  int32  first     = 3;
}

message GetAuthorizationsByAuthorityResponse {
  repeated AuthorizationHistoryEntry authorizations = 1;
  int64 count = 2;
}