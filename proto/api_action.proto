syntax = "proto3";

package api;
import "google/api/annotations.proto";
import "include/graphql.proto";
import "include/pagination.proto";
option go_package = "./api";

message ActionRequest {
  string address = 1;
  string actHash = 2;
  pagination.Pagination pagination = 3;
}

message ActionResponse {
  bool exist = 1;
  uint64 count = 2;
  repeated ActionInfo actionList = 3;
  repeated EvmTransferInfo evmTransferList = 4;
  repeated XrcInfo xrcList = 5;
}

message ActionInfo {
  string actHash = 1; // action hash
  string blkHash = 2; // block hash
  string actType = 3; // action type
  string sender = 4; // sender address
  string recipient = 5; // recipient address
  string amount = 6; // amount transferred
  uint64 timestamp = 7; // unix timestamp
  string gasFee = 8; // gas fee
  uint64 blkHeight = 9; // block height
  string gasPrice = 10; // gas price
  uint64 gasLimit = 11; // gas limit
  uint64 gasConsumed = 12; // gas consumed
  uint64 nonce = 13; // nonce
  uint64 status = 14; // execution status
  string contractAddress = 15; // contract address
  string executionRevertMsg = 16; // execution revert message
  uint64 chainId = 17; // chain id
  string methodName = 18; // method name from action_execution + method_bytes
}

message EvmTransferInfo {
  string actHash = 1;
  string blkHash = 2;
  string from = 3;
  string to = 4;
  string quantity = 5;
  uint64 blkHeight = 6;
  uint64 timestamp = 7;
}

message XrcInfo {
  string actHash = 1;
  string from = 2;
  string to = 3;
  string quantity = 4;
  uint64 blkHeight = 5;
  uint64 timestamp = 6;
  string contract = 7;
}

message ActionByDatesRequest {
  uint64 startDate = 1; // start date in unix epoch time
  uint64 endDate = 2; // end date in unix epoch time
  pagination.Pagination pagination = 3;
}
message ActionByDatesResponse {
  bool exist = 1; // whether actions exist within the time frame
  repeated ActionInfo actions = 2;
  uint64 count = 3; // total number of actions within the time frame
}

message ActionByHashRequest {
  string actHash = 1; // action hash
}
message ActionByHashResponse {
  bool exist = 1; // whether actions exist within the time frame
  ActionInfo actionInfo = 2;
  message EvmTransfers {
    string sender = 1; // sender address
    string recipient = 2; // recipient address
    string amount = 3; // amount transferred
  }
  repeated EvmTransfers evmTransfers = 3;

  message ActionTypeInfo {
    string type = 1;
    string access_list = 2;
    string gas_tip_cap = 3;
    string gas_fee_cap = 4;
    string blob_gas = 5;
    string blob_fee_cap = 6;
    string blob_hashes = 7;
    string blob_gas_price = 8;
  }
  ActionTypeInfo action_type_info = 4;

  string input_data = 5; // hex-encoded execution data

  message ActionLog {
    uint64 block_height = 1;
    string address = 2;
    string topic0 = 3;
    string topic1 = 4;
    string topic2 = 5;
    string topic3 = 6;
    bytes data = 7; // raw log data (base64 in JSON)
    string action_hash = 8;
    int64 index = 9;
  }
  repeated ActionLog logs = 6;

  message TokenTransfer {
    int64 id = 1;
    string contract_address = 2;
    string sender = 3;
    string recipient = 4;
    string amount = 5;
    string type = 6; // "erc20" or "nft"
  }
  repeated TokenTransfer token_transfers = 7;

  string block_base_fee = 8;

  message StakeAction {
    int64 bucket_id = 1;
    string amount = 2;
    string staked_amount = 3;
    string duration = 4;
    bool auto_stake = 5;
    string candidate = 6;
    string act_type = 7;
    string owner_address = 8;
  }
  StakeAction stake_action = 9;
}

message ActionByAddressRequest {
  string address = 1; // sender address or recipient address
  pagination.Pagination pagination = 2;
  string sender = 3; // optional filter by sender
  string recipient = 4; // optional filter by recipient
  string actionType = 5; // optional filter by action type
  string startTime = 6; // optional start time filter (ISO 8601)
  string endTime = 7; // optional end time filter (ISO 8601)
}
message ActionByAddressResponse {
  bool exist = 1; // whether actions exist for the given address
  repeated ActionInfo actions = 2;
  uint64 count = 3; // total number of actions for the given address
}

message ActionByTypeRequest {
  string type = 1; // action type
  pagination.Pagination pagination = 2;
}
message ActionByTypeResponse {
  bool exist = 1; // whether actions exist for the given type
  repeated ActionInfo actions = 2;
  uint64 count = 3; // total number of actions for the given type
}

message EvmTransfersByAddressRequest {
  string address = 1; // sender address or recipient address
  pagination.Pagination pagination = 2;
}

message EvmTransfersByAddressResponse {
  bool exist = 1; // whether EVM transfers exist for the given address
  uint64 count = 2; // total number of EVM transfers for the given address
  message EvmTransfer {
    string actHash = 1; // action hash
    string blkHash = 2; // block hash
    string sender = 3; // sender address
    string recipient = 4; // recipient address
    string amount = 5; // amount transferred
    uint64 blkHeight = 6; // block height
    uint64 timestamp = 7; // unix timestamp
  }
  repeated EvmTransfer evmTransfers = 3;
}

message ActionListRequest {
  pagination.Pagination pagination = 1;
  uint64 start_block_height = 2;
}
message ActionListResponse {
  bool exist = 1;
  uint64 count = 2;
  repeated ActionInfo actions = 3;
}

message ActionByHeightRequest {
  uint64 height = 1;
  pagination.Pagination pagination = 2;
}
message ActionByHeightResponse {
  bool exist = 1;
  uint64 count = 2;
  repeated ActionInfo actions = 3;
}

message ContractInteractorsRequest {
  string address = 1; // contract address
  string startTime = 2; // optional time filter start
}
message ContractInteractorsResponse {
  repeated string senders = 1;
}
service ActionService {
  rpc ActionByVoter(ActionRequest) returns (ActionResponse) {
    option (graphql.schema) = {
      type: QUERY 
      name: "ActionByVoter"
    };
    option (google.api.http) = {
      post: "/api.ActionService.ActionByVoter"
      body: "*"
    };
  };
  rpc GetXrc20ByAddress(ActionRequest) returns (ActionResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "GetXrc20ByAddress"
    };
    option (google.api.http) = {
      post: "/api.ActionService.GetXrc20ByAddress"
      body: "*"
    };
  };
  //ActionByDates finds actions by dates
  rpc ActionByDates(ActionByDatesRequest) returns (ActionByDatesResponse) {
    option (graphql.schema) = {
      type: QUERY 
      name: "ActionByDates"
    };
    option (google.api.http) = {
      post: "/api.ActionService.ActionByDates"
      body: "*"
    };
  };
  //ActionByHash finds actions by hash
  rpc ActionByHash(ActionByHashRequest) returns (ActionByHashResponse) {
    option (graphql.schema) = {
      type: QUERY 
      name: "ActionByHash"
    };
    option (google.api.http) = {
      post: "/api.ActionService.ActionByHash"
      body: "*"
    };
  };
  //ActionByAddress finds actions by address
  rpc ActionByAddress(ActionByAddressRequest) returns (ActionByAddressResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "ActionByAddress"
    };
    option (google.api.http) = {
      post: "/api.ActionService.ActionByAddress"
      body: "*"
    };
  };
  //ActionByType finds actions by action type
  rpc ActionByType(ActionByTypeRequest) returns (ActionByTypeResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "ActionByType"
    };
    option (google.api.http) = {
      post: "/api.ActionService.ActionByType"
      body: "*"
    };
  };
  // EvmTransfersByAddress finds EVM transfers by address
  rpc EvmTransfersByAddress(EvmTransfersByAddressRequest) returns (EvmTransfersByAddressResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "EvmTransfersByAddress" 
    };
    option (google.api.http) = {
      post: "/api.ActionService.EvmTransfersByAddress"
      body: "*"
    };
  };
  // ActionList returns paginated list of latest actions
  rpc ActionList(ActionListRequest) returns (ActionListResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "ActionList"
    };
    option (google.api.http) = {
      post: "/api.ActionService.ActionList"
      body: "*"
    };
  };
  // ActionByHeight finds actions by block height
  rpc ActionByHeight(ActionByHeightRequest) returns (ActionByHeightResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "ActionByHeight"
    };
    option (google.api.http) = {
      post: "/api.ActionService.ActionByHeight"
      body: "*"
    };
  };
  // ContractInteractors returns distinct senders who interacted with a contract
  rpc ContractInteractors(ContractInteractorsRequest) returns (ContractInteractorsResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "ContractInteractors"
    };
    option (google.api.http) = {
      post: "/api.ActionService.ContractInteractors"
      body: "*"
    };
  };

}