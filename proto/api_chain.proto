syntax = "proto3";

package api;
import "google/api/annotations.proto";
import "include/graphql.proto";
// import "include/pagination.proto";
option go_package = "./api";

message ChainRequest {

}

message VotingResultMeta {
    uint64 totalCandidates = 1; // total candidates
    string totalWeightedVotes = 2; // total weighted votes
    string votedTokens = 3; // voted tokens
}

message ChainResponse {
    uint64 mostRecentEpoch = 1; // most recent epoch
    uint64 mostRecentBlockHeight = 2; // most recent block height
    string totalSupply = 3; // total supply
    string totalCirculatingSupply = 4; // total circulating supply
    string totalCirculatingSupplyNoRewardPool = 5; // total circulating supply no reward pool
    VotingResultMeta votingResultMeta = 6; // voting result meta
    string exactCirculatingSupply = 7; // exact circulating supply
    message Rewards{
      string totalBalance = 1; // total balance
      string totalUnclaimed = 2; // total unclaimed
      string totalAvailable = 3; // total available
    }
    Rewards rewards = 8; // rewards
}

message MostRecentTPSRequest {
  uint64 blockWindow = 1; // number of last blocks that are backtracked to compute TPS
}

message MostRecentTPSResponse {
  double mostRecentTPS = 1; // latest transactions per second
}

message NumberOfActionsRequest {
  uint64 startEpoch = 1; // starting epoch number
  uint64 epochCount = 2; // epoch count
}

message NumberOfActionsResponse {
  bool exist = 1; // whether the starting epoch number is less than the most recent epoch number
  uint64 count = 2; // number of actions
}

message TotalTransferredTokensRequest {
  uint64 startEpoch = 1; // starting epoch number
  uint64 epochCount = 2; // epoch count
}

message TotalTransferredTokensResponse {
  string totalTransferredTokens = 1; // total tranferred tokens
}

message BlockSizeByHeightRequest {
  uint64 height = 1; // block height
}

message BlockSizeByHeightResponse {
  double blockSize = 2; // size
  string serverVersion = 3; // version
}

message GetLatestBlockHeightRequest {
}

message GetLatestBlockHeightResponse {
  uint64 height = 1; // latest block height
}

message BlockInfo {
  uint64 block_height = 1; // block height
  string block_hash = 2; // block hash
  string producer_address = 3; // producer address
  uint64 num_actions = 4; // number of actions
  int64 timestamp = 5; // block timestamp (unix timestamp)
  uint64 gas_consumed = 6; // gas consumed
  string producer_name = 7; // producer name
  string block_reward = 8; // block reward
  uint64 epoch_num = 9; // epoch number
  string priority_bonus = 10; // priority bonus
  string base_fee = 11; // base fee
}

message GetBlocksRequest {
  uint64 page = 1;         // page number (starts from 1); ignored when before_height > 0
  uint64 limit = 2;        // number of blocks per page
  uint64 before_height = 3; // cursor: return blocks with height <= before_height (0 = use page)
}

message GetBlocksResponse {
  repeated BlockInfo blocks = 1; // list of blocks
}

message GetBlockByHeightRequest {
  uint64 height = 1; // block height
}

message GetBlockByHeightResponse {
  bool exist = 1;
  BlockInfo block = 2;
}

message GetEpochInfoRequest {}

message GetEpochInfoResponse {
  uint64 epoch_height = 1; // first block height of the current epoch
  uint64 epoch_num = 2;    // current epoch number
}

message GetLatestStakingRecordRequest {}

message GetLatestStakingRecordResponse {
  string total_supply = 1;   // total supply
  string all_staking = 2;    // total staked IOTX (in rau)
  string staking_ratio = 3;  // staking ratio (decimal string)
}

message GetPeakTpsRequest {
  uint64 start_block_height = 1; // 0 = scan all blocks; > 0 = only look at blocks after this height
}

message GetPeakTpsResponse {
  string num_actions = 1;    // max(num_actions)/5 rounded to 2 decimal places
  uint64 block_height = 2;   // current max block height (cursor for next call)
}

message ActionHistoryPoint {
  string date = 1; // UTC datetime string
  uint64 sum = 2;  // total actions in bucket
}

message GetActionHistoryRequest {
  string start_time = 1; // UTC datetime string (e.g. "2024-01-01 00:00:00")
  string end_time = 2;   // UTC datetime string
  string interval = 3;   // "minute", "hour", or "day"
}

message GetActionHistoryResponse {
  repeated ActionHistoryPoint data = 1;
}

message GetStakingRatioHistoryRequest {
  string start_time = 1; // optional start date (YYYY-MM-DD)
  string end_time = 2;   // optional end date (YYYY-MM-DD)
}
message StakingRatioPoint {
  string date_time = 1;
  string ratio = 2;
}
message GetStakingRatioHistoryResponse {
  repeated StakingRatioPoint data = 1;
}

message GetChainStatsRequest {}
message GetChainStatsResponse {
  uint64 actions_num = 1;        // total number of actions, from kv table
  string total_supply = 2;       // IOTX (rau / 1e18), decimal string
  string circulating_supply = 3; // IOTX (rau / 1e18), decimal string
}

message GetTpsHistoryRequest {
  string start = 1; // start date, YYYY-MM-DD (UTC)
  string end = 2;   // end date, YYYY-MM-DD (UTC, inclusive)
}
message TpsHistoryPoint {
  string date = 1;    // YYYY-MM-DD
  double avg_tps = 2; // avg(num_actions)/2.5
  double max_tps = 3; // max(num_actions)/2.5
}
message GetTpsHistoryResponse {
  repeated TpsHistoryPoint data = 1;
}

message GetGasHistoryRequest {
  string start = 1; // YYYY-MM-DD
  string end = 2;   // YYYY-MM-DD (inclusive)
}
message GasHistoryPoint {
  string date = 1;
  string max_gas_price = 2;
  string min_gas_price = 3;
  string avg_gas_price = 4;
  string total_gas_fee = 5;
}
message GetGasHistoryResponse {
  repeated GasHistoryPoint data = 1;
}

message GetSupplyHistoryRequest {
  string start = 1; // YYYY-MM-DD
  string end = 2;   // YYYY-MM-DD (inclusive)
}
message SupplyHistoryPoint {
  string date = 1;
  string total_supply = 2;       // IOTX
  string circulating_supply = 3; // IOTX
  string burn = 4;               // IOTX, daily
  string issue = 5;              // IOTX, daily
}
message GetSupplyHistoryResponse {
  repeated SupplyHistoryPoint data = 1;
}

service ChainService {
  rpc Chain(ChainRequest) returns (ChainResponse) {
    option (graphql.schema) = {
      type: QUERY   // declare as Query
      name: "Chain" // query name
    };
    option (google.api.http) = {
      post: "/api.ChainService.Chain"
      body: "*"
    };
  };

  // MostRecentTPS gives the latest transactions per second
  rpc MostRecentTPS(MostRecentTPSRequest) returns (MostRecentTPSResponse) {
    option (graphql.schema) = {
      type: QUERY   // declare as Query
      name: "MostRecentTPS" // query name
    };
    option (google.api.http) = {
      post: "/api.ChainService.MostRecentTPS"
      body: "*"
    };
  };

  // NumberOfActions gives the number of actions
  rpc NumberOfActions(NumberOfActionsRequest) returns (NumberOfActionsResponse) {
    option (graphql.schema) = {
      type: QUERY   // declare as Query
      name: "NumberOfActions" // query name
    };
    option (google.api.http) = {
      post: "/api.ChainService.NumberOfActions"
      body: "*"
    };
  };
  // TotalTransferredTokens gives the amount of tokens transferred within a time frame
  rpc TotalTransferredTokens(TotalTransferredTokensRequest) returns (TotalTransferredTokensResponse) {
    option (graphql.schema) = {
      type: QUERY   // declare as Query
      name: "TotalTransferredTokens" // query name
    };
    option (google.api.http) = {
      post: "/api.ChainService.TotalTransferredTokens"
      body: "*"
    };
  };

  // BlockSizeByHeight gives the block size by height
  rpc BlockSizeByHeight(BlockSizeByHeightRequest) returns (BlockSizeByHeightResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "BlockSizeByHeight"
    };
    option (google.api.http) = {
      post: "/api.ChainService.BlockSizeByHeight"
      body: "*"
    };
  };

  // GetLatestBlockHeight gives the latest block height
  rpc GetLatestBlockHeight(GetLatestBlockHeightRequest) returns (GetLatestBlockHeightResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "GetLatestBlockHeight"
    };
    option (google.api.http) = {
      post: "/api.ChainService.GetLatestBlockHeight"
      body: "*"
    };
  };

  // GetBlocks gives a list of blocks with pagination
  rpc GetBlocks(GetBlocksRequest) returns (GetBlocksResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "GetBlocks"
    };
    option (google.api.http) = {
      post: "/api.ChainService.GetBlocks"
      body: "*"
    };
  };

  // GetBlockByHeight returns a single block by its height
  rpc GetBlockByHeight(GetBlockByHeightRequest) returns (GetBlockByHeightResponse) {
    option (graphql.schema) = {
      type: QUERY
      name: "GetBlockByHeight"
    };
    option (google.api.http) = {
      post: "/api.ChainService.GetBlockByHeight"
      body: "*"
    };
  };

  // GetEpochInfo returns the current epoch number and its starting block height
  rpc GetEpochInfo(GetEpochInfoRequest) returns (GetEpochInfoResponse) {
    option (google.api.http) = {
      post: "/api.ChainService.GetEpochInfo"
      body: "*"
    };
  };

  // GetLatestStakingRecord returns the most recent staking statistics
  rpc GetLatestStakingRecord(GetLatestStakingRecordRequest) returns (GetLatestStakingRecordResponse) {
    option (google.api.http) = {
      post: "/api.ChainService.GetLatestStakingRecord"
      body: "*"
    };
  };

  // GetPeakTps returns the all-time peak TPS (max block actions / 5-second block time)
  rpc GetPeakTps(GetPeakTpsRequest) returns (GetPeakTpsResponse) {
    option (google.api.http) = {
      post: "/api.ChainService.GetPeakTps"
      body: "*"
    };
  };

  // GetActionHistory returns aggregated action counts over a time range
  rpc GetActionHistory(GetActionHistoryRequest) returns (GetActionHistoryResponse) {
    option (google.api.http) = {
      post: "/api.ChainService.GetActionHistory"
      body: "*"
    };
  };
  // GetStakingRatioHistory returns staking ratio history over a time range
  rpc GetStakingRatioHistory(GetStakingRatioHistoryRequest) returns (GetStakingRatioHistoryResponse) {
    option (google.api.http) = {
      post: "/api.ChainService.GetStakingRatioHistory"
      body: "*"
    };
  };

  // GetChainStats returns total action count + total/circulating supply (IOTX units)
  rpc GetChainStats(GetChainStatsRequest) returns (GetChainStatsResponse) {
    option (google.api.http) = {
      post: "/api.ChainService.GetChainStats"
      body: "*"
    };
  };

  // GetTpsHistory returns daily avg/max TPS over a date range
  rpc GetTpsHistory(GetTpsHistoryRequest) returns (GetTpsHistoryResponse) {
    option (google.api.http) = {
      post: "/api.ChainService.GetTpsHistory"
      body: "*"
    };
  };

  // GetGasHistory returns daily gas price stats and total gas fee over a date range
  rpc GetGasHistory(GetGasHistoryRequest) returns (GetGasHistoryResponse) {
    option (google.api.http) = {
      post: "/api.ChainService.GetGasHistory"
      body: "*"
    };
  };

  // GetSupplyHistory returns daily total/circulating supply (IOTX) and daily burn/issue over a date range
  rpc GetSupplyHistory(GetSupplyHistoryRequest) returns (GetSupplyHistoryResponse) {
    option (google.api.http) = {
      post: "/api.ChainService.GetSupplyHistory"
      body: "*"
    };
  };
}